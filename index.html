<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taj Magsi</title>
<style>
  :root {
    --bg: #0A0A0A;
    --body: #E5E5E5;
    --white: #FFFFFF;
    --secondary: rgba(229,229,229,0.5);
    --accent: #4A9EFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--body);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 16px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap { max-width: 560px; padding: 40px 24px; }
  h1 { color: var(--white); font-size: 36px; letter-spacing: -0.5px; margin-bottom: 12px; }
  p { color: var(--body); line-height: 1.6; margin-bottom: 24px; }
  .links { display: flex; gap: 16px; flex-wrap: wrap; }
  a {
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    border: 1px solid rgba(74,158,255,0.3);
    padding: 10px 20px;
    border-radius: 6px;
    transition: border-color 200ms;
  }
  a:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Taj Magsi</h1>
  <p>mHealth founder and AI product builder. Co-founder of DilKiBaat, Chapter Lead at AI Collective Karachi, and builder of privacy-first NLP infrastructure for clinical mental health applications.</p>
  <div class="links">
    <a href="https://www.linkedin.com/in/tajmagsi">LinkedIn</a>
    <a href="mailto:tajmagsi2017@gmail.com">Email</a>
  </div>
</div>
</body>
</html>
